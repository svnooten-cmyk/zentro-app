name: zentro_app
description: Zentro app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_map: ^6.2.1
  latlong2: ^0.9.1
  flutter_svg: ^2.0.10
  google_maps_flutter: ^2.17.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/logo/
    - assets/images/
    - assets/pins/